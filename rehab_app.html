<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三總心臟衰竭復健系統</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #f0f9ff 0%, #cbebff 100%); min-height: 100vh; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .ai-pulse { animation: breathe 2s infinite ease-in-out; }
        .scan-line { position: absolute; left: 0; width: 100%; height: 2px; background: #3b82f6; box-shadow: 0 0 10px #3b82f6; animation: scan 2s infinite linear; }
        .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-700 flex items-center justify-center p-4">

    <div class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden min-h-[650px] relative flex flex-col">
        <header class="bg-blue-600 p-6 text-white flex justify-between items-center shadow-md z-10">
            <div class="flex items-center gap-2"><i data-lucide="activity" class="w-6 h-6"></i><h1 class="text-xl font-bold tracking-wider">三總心臟衰竭復健系統</h1></div>
            <div class="text-sm opacity-80" id="current-date"></div>
        </header>

        <div id="progress-container" class="bg-gray-50 px-6 py-3 border-b border-gray-100 flex justify-center gap-8 text-sm font-medium z-10">
            <div id="step-indicator-1" class="flex items-center gap-2 text-blue-600 transition-colors"><span class="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center border border-blue-200">1</span>基本資料</div>
            <div class="text-gray-300 flex items-center"><i data-lucide="chevron-right" class="w-4 h-4"></i></div>
            <div id="step-indicator-2" class="flex items-center gap-2 text-gray-400 transition-colors"><span class="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center border border-gray-200">2</span>今日生理數據</div>
        </div>

        <main class="flex-1 p-6 relative overflow-y-auto no-scrollbar">
            <!-- 步驟 1 -->
            <div id="section-step-1" class="max-w-lg mx-auto py-4 fade-in">
                <div class="text-center mb-6"><h2 class="text-2xl font-bold text-gray-800 mb-2">建立您的專屬檔案</h2></div>
                <form id="formStep1" onsubmit="goToStep2(event)" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2"><label class="text-sm font-medium text-gray-700">年齡</label><select id="userAge" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white"><option value="" disabled selected>請選擇</option><option value="18-39">18 - 39 歲 (年輕族群)</option><option value="40-54">40 - 54 歲 (中年族群)</option><option value="55-64">55 - 64 歲 (中老年族群)</option><option value="65-74">65 - 74 歲 (老年族群)</option><option value="75+">75 歲以上 (高齡族群)</option></select></div>
                        <div class="space-y-2"><label class="text-sm font-medium text-gray-700">性別</label><select id="userGender" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white"><option value="" disabled selected>請選擇</option><option value="male">男</option><option value="female">女</option></select></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2"><label class="text-sm font-medium text-gray-700">NYHA 分級</label><select id="nyhaClass" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white"><option value="" disabled selected>請選擇</option><option value="I">Class I</option><option value="II">Class II</option><option value="III">Class III</option><option value="IV">Class IV</option></select></div>
                        <div class="space-y-2"><label class="text-sm font-medium text-gray-700">基礎體重 (公斤)</label><input type="number" id="baseWeight" step="0.1" required min="30" max="200" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none" placeholder="65.5"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2"><label class="text-sm font-medium text-gray-700">規律有氧運動習慣</label><select id="exerciseHabit" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white"><option value="" disabled selected>請選擇</option><option value="none">無規律</option><option value="less_than_4_weeks">不到 4 週</option><option value="more_than_4_weeks">超過 4 週</option></select></div>
                        <div class="space-y-2"><label class="text-sm font-medium text-gray-700">欲改善目標</label><select id="improveGoal" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white"><option value="" disabled selected>請選擇</option><option value="cardio">提升心肺 (有氧)</option><option value="strength">增強肌力 (阻力)</option><option value="mobility">改善活動度</option><option value="pain">減緩疼痛</option></select></div>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition flex justify-center items-center gap-2">下一步：填寫今日生理數據 <i data-lucide="arrow-right" class="w-5 h-5"></i></button>
                </form>
            </div>

            <!-- 步驟 2 -->
            <div id="section-step-2" class="max-w-lg mx-auto py-4 hidden">
                <div class="text-center mb-6"><h2 class="text-2xl font-bold text-gray-800 mb-2">今日生理數據</h2></div>
                <form id="formStep2" onsubmit="startAnalysis(event)" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2"><label class="text-sm font-medium text-gray-700">收縮壓 (高壓)</label><input type="number" id="sysBP" required min="50" max="250" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none" placeholder="120"></div>
                        <div class="space-y-2"><label class="text-sm font-medium text-gray-700">舒張壓 (低壓)</label><input type="number" id="diaBP" required min="30" max="150" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none" placeholder="80"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2"><label class="text-sm font-medium text-gray-700">心跳率</label><input type="number" id="heartRate" required min="30" max="200" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none" placeholder="75"></div>
                        <div class="space-y-2"><label class="text-sm font-medium text-gray-700">今日體重</label><input type="number" id="todayWeight" step="0.1" required min="30" max="200" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none" placeholder="66.0"></div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-700">當下不適症狀</label>
                        <select id="currentSymptom" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white">
                            <option value="none" selected>無不適</option><option value="mild_tired">稍微疲倦</option><option value="chest_pain">胸悶 / 嚴重頭暈 ⚠️</option><option value="breathless">休息時也會喘 ⚠️</option>
                        </select>
                    </div>
                    <div class="flex gap-4">
                        <button type="button" onclick="goBackToStep1()" class="w-1/3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-4 rounded-xl">上一步</button>
                        <button type="submit" class="w-2/3 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl flex justify-center items-center gap-2">開始 AI 分析</button>
                    </div>
                </form>
            </div>

            <!-- Loading -->
            <div id="section-loading" class="hidden absolute inset-0 bg-white flex flex-col items-center justify-center z-20">
                <div class="relative w-32 h-32 mb-8"><div class="absolute inset-0 bg-blue-100 rounded-full ai-pulse"></div><div class="absolute inset-4 bg-blue-500 rounded-full flex items-center justify-center text-white"><i data-lucide="brain-circuit" class="w-12 h-12"></i></div><div class="absolute inset-0 rounded-full overflow-hidden"><div class="scan-line"></div></div></div>
                <h3 class="text-2xl font-bold text-gray-800 mb-2">正在綜合評估與生成課表...</h3><p class="text-sm text-gray-500">AI 正在為您量身打造專屬指導語，請稍候</p>
            </div>

            <!-- 串流影像 -->
            <div id="section-streaming" class="hidden fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-4 md:p-8 backdrop-blur-sm">
                <div class="w-full max-w-6xl bg-gray-900 rounded-2xl overflow-hidden shadow-2xl relative flex flex-col h-[85vh] border border-gray-700">
                    <div class="bg-gray-800 p-4 flex justify-between items-center text-white border-b border-gray-700 shrink-0">
                        <div class="flex items-center gap-3"><div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div><h3 class="font-bold text-lg tracking-wider">AI 即時跟練系統 (Live Stream)</h3></div>
                        <button onclick="stopStreaming()" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-xl font-bold text-sm transition shadow flex items-center gap-2"><i data-lucide="x-circle" class="w-4 h-4"></i>結束訓練</button>
                    </div>
                    <div class="flex-1 bg-black flex items-center justify-center relative w-full overflow-hidden">
                        <div id="stream-loading" class="absolute inset-0 flex flex-col items-center justify-center text-white z-10"><i data-lucide="loader-2" class="w-12 h-12 animate-spin text-blue-500 mb-4"></i><p class="text-lg font-medium tracking-widest">載入 AI 模型中...</p></div>
                        <img id="ai-stream-view" class="w-full h-full object-contain relative z-20" onload="document.getElementById('stream-loading').style.display='none'" onerror="handleStreamError()" />
                    </div>
                </div>
            </div>

            <!-- 結果區塊 -->
            <div id="section-results" class="hidden fade-in pb-10">
                <div id="resultHeaderCard" class="bg-white border border-gray-100 p-6 rounded-2xl shadow-sm flex items-start mb-6">
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center shrink-0 mr-4 mt-1" id="resultHeaderIcon"><i data-lucide="sparkles" class="w-6 h-6"></i></div>
                    <div class="w-full">
                        <h3 class="font-bold text-gray-800 text-lg mb-3" id="resultTitle">AI 專屬課表總結</h3>
                        <p class="text-sm text-gray-700 leading-relaxed bg-blue-50/50 p-4 rounded-xl border border-blue-100" id="resultSummary"></p>
                    </div>
                </div>

                <div id="dangerAlert" class="hidden bg-red-50 border border-red-200 p-6 rounded-2xl mb-8 flex flex-col items-center text-center">
                    <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mb-4"><i data-lucide="shield-alert" class="w-8 h-8"></i></div>
                    <h3 class="text-xl font-bold text-red-700 mb-2">醫療安全警示：今日不宜運動</h3>
                    <p class="text-sm text-red-600 bg-white px-4 py-3 rounded-lg border border-red-100 w-full text-left" id="dangerReason"></p>
                </div>

                <div id="normalPlanArea" class="grid md:grid-cols-2 gap-8">
                    <div>
                        <div class="flex items-center gap-2 mb-4"><i data-lucide="youtube" class="text-red-500"></i><h3 class="text-lg font-bold">今日推薦動作清單</h3></div>
                        <div class="space-y-4" id="videoList"></div>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-4"><i data-lucide="calendar" class="text-green-500"></i><h3 class="text-lg font-bold">個人化一週課表</h3></div>
                        <div class="bg-gray-50 rounded-xl p-4 border border-gray-100" id="weeklyPlan"></div>
                    </div>
                </div>
                <button onclick="location.reload()" class="mt-8 w-full border-2 border-gray-200 text-gray-500 font-bold py-3 rounded-xl hover:bg-gray-50 transition">重新評估</button>
            </div>
        </main>
    </div>

    <script>
        const API_ENDPOINT_ANALYZE = "http://127.0.0.1:5000/api/analyze";
        lucide.createIcons();
        document.getElementById('current-date').innerText = new Date().toISOString().split('T')[0];
        let globalUserData = {};

        function goToStep2(e) { e.preventDefault(); ['Age', 'Gender', 'NyhaClass', 'BaseWeight', 'ExerciseHabit', 'ImproveGoal'].forEach(id => { globalUserData[id.toLowerCase()] = document.getElementById(id.charAt(0).toLowerCase() + id.slice(1)).value; }); globalUserData.baseWeight = parseFloat(document.getElementById('baseWeight').value); document.getElementById('section-step-1').classList.add('hidden'); document.getElementById('section-step-2').classList.remove('hidden'); document.getElementById('step-indicator-1').classList.replace('text-blue-600', 'text-gray-400'); document.getElementById('step-indicator-2').classList.replace('text-gray-400', 'text-blue-600'); }
        function goBackToStep1() { document.getElementById('section-step-2').classList.add('hidden'); document.getElementById('section-step-1').classList.remove('hidden'); document.getElementById('step-indicator-2').classList.replace('text-blue-600', 'text-gray-400'); document.getElementById('step-indicator-1').classList.replace('text-gray-400', 'text-blue-600'); }

        function startAnalysis(e) {
            e.preventDefault();
            // 與後端 api_server 完全對應的 key（camelCase）
            const payload = {
                age: globalUserData.age,
                gender: globalUserData.gender,
                nyhaclass: globalUserData.nyhaclass,
                baseWeight: globalUserData.baseWeight,
                exerciseHabit: globalUserData.exercisehabit || globalUserData.exerciseHabit,
                improveGoal: globalUserData.improvegoal || globalUserData.improveGoal,
                sysBP: parseInt(document.getElementById('sysBP').value, 10),
                diaBP: parseInt(document.getElementById('diaBP').value, 10),
                heartRate: parseInt(document.getElementById('heartRate').value, 10),
                todayWeight: parseFloat(document.getElementById('todayWeight').value),
                currentSymptom: document.getElementById('currentSymptom').value
            };
            Object.assign(globalUserData, payload);
            
            document.getElementById('progress-container').classList.add('hidden');
            document.getElementById('section-step-2').classList.add('hidden');
            document.getElementById('section-loading').classList.remove('hidden');
            
            fetch(API_ENDPOINT_ANALYZE, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
            .then(response => { if (!response.ok) { return response.json().then(err => { throw new Error(err.message) }); } return response.json(); })
            .then(backendResult => generateResults(backendResult))
            .catch(error => {
                if(error.message && error.message.includes("異常") || error.message.includes("不建議")) {
                     document.getElementById('section-loading').classList.add('hidden'); document.getElementById('section-results').classList.remove('hidden'); document.getElementById('dangerAlert').classList.remove('hidden'); document.getElementById('normalPlanArea').classList.add('hidden'); document.getElementById('dangerReason').innerText = "• " + error.message; document.getElementById('resultTitle').innerHTML = `<span class="text-red-600">高風險數值阻擋</span>`; document.getElementById('resultHeaderIcon').innerHTML = '<i data-lucide="alert-triangle" class="w-6 h-6 text-red-600"></i>'; document.getElementById('resultSummary').innerText = "為保護您的安全，今日請暫停運動並充分休息。"; lucide.createIcons();
                } else { alert("連線失敗！請確認 api_server.py 執行中。\n" + error.message); document.getElementById('section-loading').classList.add('hidden'); document.getElementById('section-step-2').classList.remove('hidden'); }
            });
        }

        function startTrainingMode(videoFilename) { startStream([videoFilename]); }
        function startFullPlaylist(videosArray) { startStream(videosArray); }
        function startStream(videoListArray) {
            document.getElementById('section-streaming').classList.remove('hidden');
            document.getElementById('stream-loading').style.display = 'flex';
            document.getElementById('ai-stream-view').src = `http://127.0.0.1:5000/video_feed?videos=${encodeURIComponent(videoListArray.join(','))}`;
        }
        function stopStreaming() { document.getElementById('section-streaming').classList.add('hidden'); document.getElementById('ai-stream-view').src = ""; }
        function handleStreamError() { if(document.getElementById('section-streaming').classList.contains('hidden')) return; alert("影像串流載入失敗！請確認 Python API 正在執行"); stopStreaming(); }

        function generateResults(backendData) {
            document.getElementById('section-loading').classList.add('hidden');
            document.getElementById('section-results').classList.remove('hidden');

            document.getElementById('resultSummary').innerText = backendData.gpt_summary || "系統為您推薦以下安全課表。";

            let videosHTML = backendData.videos.map(v => `
                <div class="p-4 bg-white border border-gray-100 rounded-xl shadow-sm">
                    <div class="flex items-center gap-4 mb-3">
                        <div class="w-16 h-12 ${v.color} rounded flex items-center justify-center shrink-0"><i data-lucide="play-circle"></i></div>
                        <div><h4 class="font-bold text-sm text-gray-800">${v.title}</h4>
                        <div class="flex gap-2 text-xs mt-1">${v.tags.map(tag => `<span class="bg-gray-100 px-2 py-0.5 rounded text-gray-500">#${tag}</span>`).join('')}</div></div>
                    </div>
                    <button onclick="startTrainingMode('${v.filename}')" class="w-full bg-blue-50 text-blue-600 font-bold py-2 rounded-lg flex justify-center items-center gap-2 hover:bg-blue-600 hover:text-white transition">
                        <i data-lucide="video" class="w-4 h-4"></i> 單曲跟練
                    </button>
                </div>
            `).join('');

            const allVideoFiles = JSON.stringify(backendData.videos.map(v => v.filename));
            videosHTML += `<button onclick='startFullPlaylist(${allVideoFiles})' class="w-full mt-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 rounded-xl shadow-md flex justify-center items-center gap-2 hover:opacity-90 transition transform hover:-translate-y-0.5"><i data-lucide="layers" class="w-5 h-5"></i> 🔥 開始今日完整課表</button>`;
            document.getElementById('videoList').innerHTML = videosHTML;
            
            // 【關鍵亮點】：使用美觀的時間軸 (Timeline) 渲染 GPT 傳回的 7 日計畫！
            const weekDays = ['週一', '週二', '週三', '週四', '週五', '週六', '週日'];
            document.getElementById('weeklyPlan').innerHTML = weekDays.map((day, index) => {
                let planText = backendData.plan[index] || "休息日";
                let isRest = planText.includes("休息") || planText.includes("伸展");
                return `
                <div class="flex relative pb-6 last:pb-0">
                    ${index !== weekDays.length - 1 ? '<div class="absolute left-[15px] top-8 bottom-0 w-0.5 bg-gray-200"></div>' : ''}
                    <div class="w-8 h-8 rounded-full ${isRest ? 'bg-green-100 text-green-600 border-green-200' : 'bg-blue-100 text-blue-600 border-blue-200'} flex items-center justify-center text-xs font-bold shrink-0 z-10 border-2 shadow-sm">
                        ${index + 1}
                    </div>
                    <div class="ml-4 flex-1">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs font-bold text-gray-500">${day}</span>
                            ${isRest ? '<span class="text-[10px] bg-green-100 text-green-600 px-2 py-0.5 rounded-full font-bold">恢復</span>' : ''}
                        </div>
                        <p class="text-gray-800 text-sm font-medium bg-white p-3 rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition">
                            ${planText}
                        </p>
                    </div>
                </div>`;
            }).join('');

            lucide.createIcons();
        }
    </script>
</body>
</html>
