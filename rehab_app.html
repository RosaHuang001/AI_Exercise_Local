<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三總心臟衰竭復健系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #cbebff 100%);
            min-height: 100vh;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .ai-pulse { animation: breathe 2s infinite ease-in-out; }
        .scan-line {
            position: absolute; left: 0; width: 100%; height: 2px;
            background: #3b82f6; box-shadow: 0 0 10px #3b82f6;
            animation: scan 2s infinite linear;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 標籤選取樣式 */
        .tag-checkbox:checked + span {
            background-color: #eff6ff;
            border-color: #3b82f6;
            color: #1d4ed8;
            box-shadow: 0 0 0 1px #3b82f6;
        }
    </style>
</head>
<body class="text-gray-700 flex items-center justify-center p-4">

    <!-- 主容器 -->
    <div class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden min-h-[650px] relative flex flex-col">
        
        <!-- Header -->
        <header class="bg-blue-600 p-6 text-white flex justify-between items-center shadow-md z-10">
            <div class="flex items-center gap-2">
                <i data-lucide="activity" class="w-6 h-6"></i>
                <h1 class="text-xl font-bold tracking-wider">三總心臟衰竭復健系統</h1>
            </div>
            <div class="text-sm opacity-80" id="current-date"></div>
        </header>

        <!-- 進度指示 -->
        <div id="progress-container" class="bg-gray-50 px-6 py-3 border-b border-gray-100 flex justify-center gap-8 text-sm font-medium z-10">
            <div id="step-indicator-1" class="flex items-center gap-2 text-blue-600 transition-colors">
                <span class="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center border border-blue-200 text-xs font-bold">1</span>
                基本資料
            </div>
            <div class="text-gray-300 flex items-center"><i data-lucide="chevron-right" class="w-4 h-4"></i></div>
            <div id="step-indicator-2" class="flex items-center gap-2 text-gray-400 transition-colors">
                <span class="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center border border-gray-200 text-xs font-bold">2</span>
                今日生理數據
            </div>
        </div>

        <main class="flex-1 p-6 relative overflow-y-auto no-scrollbar">

            <!-- ================= 步驟 1：基本資料 (還原滿意版) ================= -->
            <div id="section-step-1" class="max-w-2xl mx-auto py-4 fade-in">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">建立您的專屬檔案</h2>
                    <p class="text-gray-500">告訴我們您的長期健康狀況。</p>
                </div>

                <form id="formStep1" onsubmit="goToStep2(event)" class="space-y-6">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-700">年齡</label>
                            <select id="userAge" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white">
                                <option value="" disabled selected>請選擇年齡區間</option>
                                <option value="18-39">18 - 39 歲 (年輕族群)</option>
                                <option value="40-54">40 - 54 歲 (中年族群)</option>
                                <option value="55-64">55 - 64 歲 (中老年族群)</option>
                                <option value="65-74">65 - 74 歲 (老年族群)</option>
                                <option value="75+">75 歲以上 (高齡族群)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-700">性別</label>
                            <select id="userGender" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white">
                                <option value="" disabled selected>請選擇性別</option>
                                <option value="male">男</option>
                                <option value="female">女</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-700">NYHA 分級 (心衰竭程度)</label>
                            <select id="nyhaClass" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white">
                                <option value="" disabled selected>請選擇分級...</option>
                                <option value="I">Class I (日常活動不受限)</option>
                                <option value="II">Class II (輕度受限)</option> 
                                <option value="III">Class III (明顯受限)</option>
                                <option value="IV">Class IV (無法活動)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-700">基礎體重 (乾體重)</label>
                            <div class="relative">
                                <input type="number" id="baseWeight" step="0.1" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none" placeholder="例如: 65.5">
                                <span class="absolute right-4 top-3.5 text-gray-400 text-sm">公斤</span>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-700">目前規律有氧運動習慣</label>
                            <select id="exerciseHabit" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white">
                                <option value="" disabled selected>請選擇運動頻率</option>
                                <option value="none">無規律運動習慣</option>
                                <option value="less_than_4_weeks">有，但維持不到 4 週</option>
                                <option value="more_than_4_weeks">有，已規律執行超過 4 週</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-700">欲改善目標</label>
                            <select id="improveGoal" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white">
                                <option value="" disabled selected>請選擇目標</option>
                                <option value="cardio">提升心肺功能 (有氧)</option>
                                <option value="strength">增強肌力 (阻力)</option>
                                <option value="mobility">改善關節活動度</option>
                                <option value="pain">減緩疼痛</option>
                            </select>
                        </div>
                    </div>

                    <!-- 慢性病史 -->
                    <div class="space-y-3">
                        <label class="text-sm font-medium text-gray-700">慢性病史 <span class="text-xs text-blue-500 font-normal ml-1">(可多選)</span></label>
                        <div class="flex flex-wrap gap-2">
                            <label class="cursor-pointer"><input type="checkbox" name="chronic" value="none" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">無</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="chronic" value="高血壓" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">高血壓</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="chronic" value="糖尿病" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">糖尿病</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="chronic" value="高血脂症" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">高血脂症</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="chronic" value="冠心症" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">冠心症/心肌梗塞</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="chronic" value="心律不整" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">心律不整</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="chronic" value="慢性腎臟病" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">慢性腎臟病</span></label>
                        </div>
                    </div>

                    <!-- 手術史 -->
                    <div class="space-y-3">
                        <label class="text-sm font-medium text-gray-700">手術史 <span class="text-xs text-blue-500 font-normal ml-1">(可多選)</span></label>
                        <div class="flex flex-wrap gap-2">
                            <label class="cursor-pointer"><input type="checkbox" name="surgery" value="none" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">無</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="surgery" value="心導管" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">心導管/支架置放</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="surgery" value="繞道手術" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">冠狀動脈繞道手術</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="surgery" value="LVAD" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">左心室輔助器 (LVAD)</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="surgery" value="節律器" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">心律調節器/去顫器</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="surgery" value="人工關節" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">人工關節置換</span></label>
                        </div>
                    </div>

                    <!-- 心衰主要症狀 -->
                    <div class="space-y-3">
                        <label class="text-sm font-medium text-gray-700">心衰竭主要症狀 <span class="text-xs text-blue-500 font-normal ml-1">(可多選)</span></label>
                        <div class="flex flex-wrap gap-2">
                            <label class="cursor-pointer"><input type="checkbox" name="symptoms" value="none" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">無</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="symptoms" value="累" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">容易疲倦無力 (累)</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="symptoms" value="喘" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">活動時呼吸喘促 (喘)</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="symptoms" value="腫" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">下肢水腫 (腫)</span></label>
                            <label class="cursor-pointer"><input type="checkbox" name="symptoms" value="夜喘" class="sr-only tag-checkbox"><span class="inline-block px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm transition-all shadow-sm">平躺呼吸困難/夜間喘醒</span></label>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform active:scale-[0.98] flex justify-center items-center gap-2">
                        下一步：填寫今日生理數據 <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </form>
            </div>

            <!-- 步驟 2：今日數據 (簡潔版) -->
            <div id="section-step-2" class="max-w-lg mx-auto py-4 hidden">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">今日生理數據評估</h2>
                    <p class="text-gray-500">系統必須評估您當下的身體狀況。</p>
                </div>
                <form id="formStep2" onsubmit="startAnalysis(event)" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-700">收縮壓 (高壓)</label>
                            <input type="number" id="sysBP" required placeholder="請輸入" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-700">今日體重</label>
                            <input type="number" id="todayWeight" step="0.1" required placeholder="請輸入" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-700">當下症狀</label>
                        <select id="currentSymptom" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white">
                            <option value="" disabled selected>請選擇當下狀態...</option>
                            <option value="none">精神良好，無不適</option>
                            <option value="breathless">輕微喘 ⚠️</option>
                        </select>
                    </div>
                    <div class="flex gap-4">
                        <button type="button" onclick="goBackToStep1()" class="w-1/3 bg-gray-100 py-4 rounded-xl font-bold">上一步</button>
                        <button type="submit" class="w-2/3 bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2">
                            <i data-lucide="sparkles" class="w-5 h-5"></i> 開始分析
                        </button>
                    </div>
                </form>
            </div>

            <!-- 分析中動畫 -->
            <div id="section-loading" class="hidden absolute inset-0 bg-white flex flex-col items-center justify-center z-20">
                <div class="relative w-32 h-32 mb-8">
                    <div class="absolute inset-0 bg-blue-100 rounded-full ai-pulse"></div>
                    <div class="absolute inset-4 bg-blue-500 rounded-full flex items-center justify-center shadow-lg text-white">
                        <i data-lucide="brain-circuit" class="w-12 h-12"></i>
                    </div>
                    <div class="absolute inset-0 rounded-full overflow-hidden"><div class="scan-line"></div></div>
                </div>
                <h3 class="text-2xl font-bold text-gray-800">AI 正在評估安全性...</h3>
                <p id="loading-text" class="text-blue-500 font-medium">驗證生理指標中...</p>
                <div class="w-64 h-2 bg-gray-100 rounded-full mt-6 overflow-hidden"><div id="progress-bar" class="h-full bg-blue-500 w-0 transition-all duration-[3000ms] ease-out"></div></div>
            </div>

            <!-- 即時跟練影像 (雙畫面) -->
            <div id="section-streaming" class="hidden fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-4 backdrop-blur-sm">
                <div class="w-full max-w-6xl bg-[#0f0f0f] rounded-2xl overflow-hidden shadow-2xl relative flex flex-col h-[85vh] border border-gray-800">
                    <div class="bg-gradient-to-b from-black/80 to-transparent p-4 flex justify-between items-center text-white absolute top-0 left-0 w-full z-30">
                        <div class="flex items-center gap-3"><div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div><h3 class="font-bold tracking-widest text-sm">AI 即時跟練</h3></div>
                        <button onclick="stopStreaming()" class="bg-red-600 hover:bg-red-700 px-5 py-2 rounded-lg font-bold text-sm">結束跟練</button>
                    </div>
                    <div class="flex-1 bg-black flex items-center justify-center relative w-full overflow-hidden">
                        <img id="ai-stream-view" class="w-full h-full object-contain relative z-20" />
                    </div>
                </div>
            </div>

            <!-- ================= 結果顯示區塊 (還原滿意版) ================= -->
            <div id="section-results" class="hidden fade-in pb-10 space-y-6">
                
                <!-- AI 總結卡片與側邊徽章 -->
                <div class="bg-white border border-gray-100 p-6 rounded-2xl shadow-sm flex gap-6 items-start relative overflow-hidden">
                    <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center shrink-0 border border-blue-100"><i data-lucide="sparkles" class="w-8 h-8"></i></div>
                    <div class="flex-1 pr-32">
                        <h3 class="font-bold text-gray-800 text-lg mb-2">AI 專屬課表總結</h3>
                        <p class="text-sm text-gray-700 leading-relaxed bg-blue-50/40 p-4 rounded-xl border border-blue-100 mt-2" id="resultSummary"></p>
                    </div>
                    <!-- 當前目標徽章 (還原 image_c09d3a.png) -->
                    <div class="absolute right-6 top-6 bg-blue-50/80 p-3 rounded-2xl border border-blue-100 text-center w-24">
                        <span class="text-[10px] text-gray-400 block mb-1">當前目標</span>
                        <p class="text-blue-700 font-bold text-sm leading-tight" id="resultGoalText"></p>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-8">
                    <!-- 左：推薦清單與完整跟練按鈕 -->
                    <div class="space-y-4">
                        <h3 class="font-bold flex items-center gap-2 px-1 text-gray-800"><i data-lucide="play-circle" class="text-red-500"></i> 今日推薦動作清單</h3>
                        <div class="space-y-4" id="videoList"></div>
                        
                        <!-- 🔥 紫色大按鈕：開始今日完整課表 -->
                        <button onclick="startPlaylist()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-4 rounded-2xl shadow-xl transition-all transform hover:-translate-y-1 active:scale-95 flex justify-center items-center gap-2 mt-6">
                            <i data-lucide="layers" class="w-5 h-5"></i> 🔥 開始今日完整課表
                        </button>
                    </div>
                    
                    <!-- 右：週計畫 Timeline -->
                    <div>
                        <h3 class="font-bold mb-4 flex items-center gap-2 px-1 text-gray-800"><i data-lucide="calendar" class="text-green-500"></i> 個人化一週規劃</h3>
                        <div class="bg-white border border-gray-100 rounded-2xl p-6 space-y-6" id="weeklyPlan"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:5000/api/analyze";
        lucide.createIcons();
        document.getElementById('current-date').innerText = new Date().toISOString().split('T')[0];
        let globalData = {};
        let currentVideos = [];

        function goToStep2(e) {
            e.preventDefault();
            globalData = {
                nyhaclass: document.getElementById('nyhaClass').value,
                improveGoal: document.getElementById('improveGoal').value,
                age: document.getElementById('userAge').value,
                gender: document.getElementById('userGender').value,
                chronic: Array.from(document.querySelectorAll('input[name="chronic"]:checked')).map(el => el.value),
                surgery: Array.from(document.querySelectorAll('input[name="surgery"]:checked')).map(el => el.value),
                symptoms: Array.from(document.querySelectorAll('input[name="symptoms"]:checked')).map(el => el.value)
            };
            document.getElementById('section-step-1').classList.add('hidden');
            document.getElementById('section-step-2').classList.remove('hidden');
            document.getElementById('step-indicator-2').classList.replace('text-gray-400', 'text-blue-600');
        }

        function goBackToStep1() {
            document.getElementById('section-step-1').classList.remove('hidden');
            document.getElementById('section-step-2').classList.add('hidden');
        }

        async function startAnalysis(e) {
            e.preventDefault();
            const payload = { ...globalData, sysBP: document.getElementById('sysBP').value, todayWeight: document.getElementById('todayWeight').value, currentSymptom: document.getElementById('currentSymptom').value };
            document.getElementById('section-step-2').classList.add('hidden');
            document.getElementById('section-loading').classList.remove('hidden');
            setTimeout(() => document.getElementById('progress-bar').style.width = "100%", 100);

            try {
                const resp = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const res = await resp.json();
                if (resp.ok) renderResults(res);
                else alert("分析失敗：" + res.message);
            } catch (err) { alert("無法連線後端"); location.reload(); }
        }

        function renderResults(data) {
            document.getElementById('section-loading').classList.add('hidden');
            document.getElementById('section-results').classList.remove('hidden');
            currentVideos = data.videos;

            const goalMap = { 'strength': '增強肌力', 'cardio': '心肺耐力', 'mobility': '活動度', 'pain': '減緩疼痛' };
            document.getElementById('resultGoalText').innerText = goalMap[globalData.improveGoal] || "個人復健";
            document.getElementById('resultSummary').innerText = data.gpt_summary;

            // 渲染動作清單：移除 (AI評分:x.x)
            document.getElementById('videoList').innerHTML = data.videos.map(v => `
                <div class="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm hover:shadow-md transition group relative overflow-hidden">
                    <div class="flex items-center gap-4">
                        <div class="w-20 h-20 bg-blue-50 rounded-2xl flex items-center justify-center shrink-0 border border-blue-100 group-hover:bg-blue-100 transition-colors">
                            <i data-lucide="play" class="text-blue-600 w-8 h-8"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-gray-800 text-sm truncate">${v.title}</h4>
                            <div class="flex gap-2 mt-1.5 overflow-x-auto no-scrollbar">
                                ${v.tags.map(t => `<span class="bg-gray-100 text-gray-400 text-[10px] px-2 py-0.5 rounded-full whitespace-nowrap">#${t}</span>`).join('')}
                            </div>
                            <div class="flex gap-4 mt-2">
                                ${v.stats.map(s => `<div class="flex items-center gap-1 text-[10px] font-bold text-blue-500"><i data-lucide="${s.icon}" class="w-3 h-3"></i> <span>${s.text}</span></div>`).join('')}
                            </div>
                        </div>
                    </div>
                    <button onclick="startStream(['${v.filename}'])" class="w-full mt-3 bg-blue-50 hover:bg-blue-600 text-blue-600 hover:text-white py-2.5 rounded-xl font-bold text-xs flex justify-center items-center gap-2 transition-all">
                        <i data-lucide="video" class="w-4 h-4"></i> 單曲跟練
                    </button>
                </div>
            `).join('');

            // 渲染一週時間軸
            const dayNames = ["週一", "週二", "週三", "週四", "週五", "週六", "週日"];
            document.getElementById('weeklyPlan').innerHTML = data.plan.map((p, i) => {
                const isRest = p.includes("休息") || p.includes("恢復");
                return `
                <div class="flex gap-4 pb-6 last:pb-0 relative">
                    ${i < 6 ? '<div class="absolute left-4 top-8 bottom-0 w-0.5 bg-gray-100"></div>' : ''}
                    <div class="w-8 h-8 rounded-full ${isRest ? 'bg-green-100 text-green-600 border-green-200' : 'bg-blue-100 text-blue-600 border-blue-200'} flex items-center justify-center text-xs font-bold z-10 border-2 shrink-0 shadow-sm">${i+1}</div>
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">${dayNames[i]}</span>
                            ${isRest ? '<span class="text-[10px] bg-green-50 text-green-500 px-2 rounded-full font-bold">恢復</span>' : ''}
                        </div>
                        <div class="bg-gray-50/50 p-3 rounded-xl border border-gray-100 text-sm font-medium text-gray-700 leading-snug">
                            ${p}
                        </div>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
        }

        function startPlaylist() {
            const paths = currentVideos.map(v => v.filename);
            if (paths.length > 0) startStream(paths);
        }

        function startStream(paths) {
            document.getElementById('section-streaming').classList.remove('hidden');
            const videoParam = encodeURIComponent(paths.join(','));
            document.getElementById('ai-stream-view').src = `http://127.0.0.1:5000/video_feed?videos=${videoParam}`;
        }

        function stopStreaming() {
            document.getElementById('section-streaming').classList.add('hidden');
            document.getElementById('ai-stream-view').src = "";
        }
    </script>
</body>
</html>
